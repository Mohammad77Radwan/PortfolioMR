<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#022c2b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#nodeGrad)"/>
  
  <!-- Nodes -->
  <g opacity="0.9">
    <rect x="80" y="80" width="50" height="50" fill="#fff" rx="6" stroke="#0891b2" stroke-width="2"/>
    <circle cx="105" cy="105" r="3" fill="#06b6d4"/>
    
    <rect x="250" y="60" width="50" height="50" fill="#fbbf24" rx="6" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="275" cy="85" r="3" fill="#f59e0b"/>
    
    <rect x="420" y="85" width="50" height="50" fill="#10b981" rx="6" stroke="#059669" stroke-width="2"/>
    <circle cx="445" cy="110" r="3" fill="#059669"/>
    
    <rect x="160" y="210" width="50" height="50" fill="#fff" rx="6" stroke="#0891b2" stroke-width="2"/>
    <circle cx="185" cy="235" r="3" fill="#06b6d4"/>
    
    <rect x="360" y="220" width="50" height="50" fill="#fbbf24" rx="6" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="385" cy="245" r="3" fill="#f59e0b"/>
    
    <!-- Connections -->
    <line x1="130" y1="105" x2="250" y2="85" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
    <line x1="300" y1="110" x2="420" y2="110" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
    <line x1="105" y1="130" x2="185" y2="210" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
    <line x1="275" y1="110" x2="385" y2="220" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
    <line x1="210" y1="235" x2="360" y2="245" stroke="#fff" stroke-width="2.5" opacity="0.6"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">Collaborative Node Editor</text>
  
  <!-- Subtitle -->
  <text x="300" y="360" font-family="Arial, sans-serif" font-size="20" fill="#cffafe" text-anchor="middle" opacity="0.9">Real-time Visual Programming</text>
</svg>