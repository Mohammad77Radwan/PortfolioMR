<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ragGrad)"/>
  
  <!-- Neural network nodes and connections -->
  <g opacity="0.9">
    <!-- Layer 1 -->
    <circle cx="100" cy="100" r="12" fill="#fff"/>
    <circle cx="180" cy="70" r="12" fill="#fbbf24"/>
    <circle cx="220" cy="140" r="12" fill="#fff"/>
    
    <!-- Layer 2 -->
    <circle cx="300" cy="80" r="12" fill="#fbbf24"/>
    <circle cx="300" cy="160" r="12" fill="#fff"/>
    
    <!-- Layer 3 -->
    <circle cx="450" cy="120" r="12" fill="#fff"/>
    <circle cx="480" cy="80" r="10" fill="#fbbf24"/>
    <circle cx="480" cy="160" r="10" fill="#10b981"/>
    
    <!-- Connections -->
    <line x1="112" y1="100" x2="168" y2="70" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="125" y1="105" x2="188" y2="135" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="180" y1="82" x2="288" y2="85" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="220" y1="128" x2="288" y2="155" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="312" y1="80" x2="438" y2="120" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <line x1="312" y1="160" x2="438" y2="120" stroke="#fff" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle">Enterprise RAG Pipeline</text>
  
  <!-- Subtitle -->
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="20" fill="#e9d5ff" text-anchor="middle" opacity="0.9">AI-Powered Architecture</text>
</svg>