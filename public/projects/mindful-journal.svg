<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="journalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#journalGrad)"/>
  
  <!-- Journal/thoughts visualization -->
  <g opacity="0.9">
    <!-- Notebook -->
    <rect x="80" y="60" width="120" height="140" fill="#fff" rx="6" stroke="#e0e7ff" stroke-width="2"/>
    <line x1="100" y1="60" x2="100" y2="200" stroke="#e0e7ff" stroke-width="2" opacity="0.5"/>
    
    <!-- Lines (writing) -->
    <line x1="115" y1="80" x2="180" y2="80" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="115" y1="100" x2="175" y2="100" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="115" y1="120" x2="185" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="115" y1="140" x2="160" y2="140" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <line x1="115" y1="160" x2="180" y2="160" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <line x1="115" y1="180" x2="170" y2="180" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Brain/mind icon -->
    <circle cx="320" cy="110" r="35" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.8"/>
    <path d="M 300 110 Q 295 90 310 85 Q 320 80 330 85 Q 345 90 340 110" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.8"/>
    <circle cx="320" cy="110" r="12" fill="#fbbf24" opacity="0.6"/>
    
    <!-- Meditation pose -->
    <circle cx="450" cy="90" r="18" fill="#10b981" opacity="0.8"/>
    <path d="M 450 108 L 450 140" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    <path d="M 432 125 L 450 140 L 468 125" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    <path d="M 420 120 L 432 125 M 480 120 L 468 125" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">Mindful Journal</text>
  
  <!-- Subtitle -->
  <text x="300" y="360" font-family="Arial, sans-serif" font-size="20" fill="#c7d2fe" text-anchor="middle" opacity="0.9">AI-Powered Journaling</text>
</svg>
